<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HomeInventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="app/styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
// Default tweak values live here — edit-mode rewrites this block on disk
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "paper",
  "accent": "terracotta",
  "accentHue": 38,
  "density": "airy"
}/*EDITMODE-END*/;
</script>

<script src="app/data.js"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/HomeView.jsx"></script>
<script type="text/babel" src="app/BrowseView.jsx"></script>
<script type="text/babel" src="app/DetailView.jsx"></script>
<script type="text/babel" src="app/Overlays.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  // Route persisted to localStorage so refresh keeps your place
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem("hi_route")) || { name: "home" }; } catch { return { name: "home" }; }
  });
  useEffect(() => { localStorage.setItem("hi_route", JSON.stringify(route)); }, [route]);

  const [modalOpen, setModalOpen] = useState(false);
  const [newCatalogOpen, setNewCatalogOpen] = useState(false);
  const [addItemCatalogId, setAddItemCatalogId] = useState(null);

  // Tweaks
  const [tweaks, setTweaks] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem("hi_tweaks")) || {}) }; }
    catch { return { ...TWEAK_DEFAULTS }; }
  });
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    localStorage.setItem("hi_tweaks", JSON.stringify(tweaks));
    document.body.className = `variant-${tweaks.variant} density-${tweaks.density}`;
    if (tweaks.accentHue !== undefined) {
      const l = tweaks.variant === "ink" ? 0.78 : tweaks.variant === "gallery" ? 0.5 : 0.54;
      document.body.style.setProperty("--accent", `oklch(${l} 0.13 ${tweaks.accentHue})`);
    }
  }, [tweaks]);

  // Tweaks bridge
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const onTweak = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  // Global openers used by inline click handlers in sub-views
  window.__openItem = (id) => setRoute({ name: "detail", itemId: id });
  window.__openCatalog = (id) => setRoute({ name: "browse", catalogId: id });

  return (
    <>
      {route.name === "home" && (
        <HomeView
          onOpenCatalog={(id) => setRoute({ name: "browse", catalogId: id })}
          onAddItem={() => { setAddItemCatalogId(null); setModalOpen(true); }}
          onNewCatalog={() => setNewCatalogOpen(true)}
        />
      )}
      {route.name === "browse" && (
        <BrowseView
          catalogId={route.catalogId}
          onBack={() => setRoute({ name: "home" })}
          onOpenItem={(id) => setRoute({ name: "detail", itemId: id })}
          onAddItem={() => { setAddItemCatalogId(route.catalogId); setModalOpen(true); }}
        />
      )}
      {route.name === "detail" && (
        <DetailView
          itemId={route.itemId}
          onBack={() => setRoute({ name: "browse", catalogId: window.ITEMS.find((i) => i.id === route.itemId).catalogId })}
          onOpenCatalog={(id) => setRoute({ name: "browse", catalogId: id })}
        />
      )}

      <AddItemModal
        open={modalOpen}
        initialCatalogId={addItemCatalogId}
        onClose={() => setModalOpen(false)}
        onSave={() => {}}
      />

      <NewCatalogModal
        open={newCatalogOpen}
        onClose={() => setNewCatalogOpen(false)}
        onSave={() => {}}
      />

      <TweaksPanel
        visible={tweaksVisible}
        variant={tweaks.variant}
        density={tweaks.density}
        accent={tweaks.accent}
        onChange={onTweak}
      />
    </>
  );
}

// Mount once all babel scripts have compiled
function tryMount() {
  if (window.HomeView && window.BrowseView && window.DetailView && window.AddItemModal && window.NewCatalogModal && window.TweaksPanel && window.ItemPhoto) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  } else {
    setTimeout(tryMount, 40);
  }
}
tryMount();
</script>
</body>
</html>
